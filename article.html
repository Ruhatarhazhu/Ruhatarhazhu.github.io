<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Hasznos cikkek használt ruhák vásárlásáról és divatról a Ruhatárház blogján.">

<script id="schemaData" type="application/ld+json"></script>
  
<title>Cikk – Ruhatárház</title>

<style>

body{
font-family:Inter, sans-serif;
max-width:900px;
margin:auto;
padding:40px 20px;
background:#f6f6f6;
}

article{
background:white;
padding:30px;
border-radius:12px;
border:1px solid #eee;
}

h1{
margin-bottom:20px;
}

p{
line-height:1.6;
margin-bottom:16px;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#3a7d2e;
font-weight:600;
}

.error{
color:#999;
font-style:italic;
}

</style>

</head>

<body>

<a class="back" href="cikkek.html">← Vissza a cikkekhez</a>

<article>

<h1 id="title">Betöltés...</h1>

<div id="content"></div>

</article>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/1js2SD4xPHS49y5Jo6pjBzScwXnePuTzE2yghCn2pJjU/gviz/tq?sheet=Cikkek";

function getSlug(){
return new URLSearchParams(window.location.search).get("slug");
}

async function loadArticle(){

try{

const res = await fetch(sheetURL);
const text = await res.text();

const json = JSON.parse(
text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
);

const rows = json.table.rows;

const slug = getSlug();

let found = false;

rows.forEach(r=>{

if(!r.c) return;

const title = r.c[0]?.v || "";
const articleSlug = r.c[1]?.v || "";
const content = r.c[3]?.v || "";

if(articleSlug && articleSlug.trim() === slug){

found = true;

document.getElementById("title").textContent = title;

document.title = title + " | Ruhatárház";

const formattedContent = content.replace(/\n/g,"<br><br>");
document.getElementById("content").innerHTML = formattedContent;

/* META DESCRIPTION */
document.querySelector('meta[name="description"]').setAttribute(
"content",
content.substring(0,150)
);

/* GOOGLE RICH RESULT */
const schema = {
"@context":"https://schema.org",
"@type":"Article",
"headline": title,
"description": content.substring(0,150),
"author":{
"@type":"Organization",
"name":"Ruhatárház"
},
"publisher":{
"@type":"Organization",
"name":"Ruhatárház"
},
"mainEntityOfPage": window.location.href
};

document.getElementById("schemaData").textContent =
JSON.stringify(schema);

}


});

if(!found){

document.getElementById("title").textContent = "Cikk nem található";

document.getElementById("content").innerHTML =
"<p class='error'>A keresett cikk nem található.</p>";

}

}catch(e){

document.getElementById("title").textContent = "Hiba";

document.getElementById("content").innerHTML =
"<p class='error'>Nem sikerült betölteni a cikket.</p>";

}

}

loadArticle();

</script>

</body>
</html>
