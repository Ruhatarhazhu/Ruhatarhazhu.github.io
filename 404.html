<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>

var path = window.location.pathname;

if(path.startsWith("/termek/")){

var slug = path.replace("/termek/","");

window.location.replace("/product.html?slug="+slug);

}else{

window.location.replace("/");

}

</script>
</head>
<body></body>
</html>
