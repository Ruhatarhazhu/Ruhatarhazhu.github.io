  <script src="/js/products.js"></script>
  <script>

    let currentIndex = 0;
let images = [];

function slugify(text){
  return text
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/ /g,"-");
}

// EZ A FONTOS: a fájlnév slug-ja
const slug = "sinsay-m-es-noi-pulover";

const product = products.find(p => p.slug === slug);

if(product){

  document.getElementById("title").innerText = product.name;
  document.getElementById("price").innerText = product.price + " Ft";
  document.getElementById("size").innerText = product.size || "-";
  document.getElementById("desc").innerText = product.description || "";
  document.getElementById("vintedBtn").href = product.vinted;

  // 🔥 GALÉRIA
  images = product.images || [];

if(images.length > 0){
  showImage();
}

}
function showImage(){
  if(images.length === 0) return;
  document.getElementById("mainImage").src = images[currentIndex];
}

function nextImage(){
  currentIndex = (currentIndex + 1) % images.length;
  showImage();
}

function prevImage(){
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  showImage();
}
  </script>
