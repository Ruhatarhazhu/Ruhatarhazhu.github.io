<style>

body{
font-family:'Inter',sans-serif;
background:#f6f6f6;
margin:0;
padding:40px 20px;
}

.wrapper{
max-width:900px;
margin:auto;
background:white;
padding:40px;
border-radius:18px;
box-shadow:0 20px 60px rgba(0,0,0,0.06);
}

.product-layout{
  display:flex;
  gap:40px;
  flex-wrap:nowrap;   /* 👈 EZ A LÉNYEG */
  align-items:flex-start;
  flex-direction:row;
}

.image img{
width:100%;
max-width:400px;
border-radius:14px;
}

.price{
font-size:22px;
font-weight:600;
margin:15px 0;
}

.button{
display:inline-block;
background:#3a7d2e;
color:white;
padding:12px 22px;
border-radius:10px;
text-decoration:none;
margin-top:15px;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#555;
}

  .gallery{
  position:relative;
  max-width:400px;
}

.gallery img{
  width:100%;
  border-radius:14px;
}

.gallery-controls{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.gallery-controls button{
  padding:6px 12px;
  border:none;
  border-radius:8px;
  background:#3a7d2e;
  color:white;
  cursor:pointer;
}

.image{
  flex:1;
  max-width:400px;
  min-width:250px;
}

.product-layout > div:last-child{
  flex:1;
  min-width:300px;
}

@media(max-width:768px){
  .product-layout{
    flex-direction:column !important;
    gap:20px; /* kicsit kisebb tér mobilon */
  }

  .image{
    max-width:100%;
    min-width:unset;
  }

  .product-layout > div:last-child{
    min-width:unset;
  }
}
  #soldBadge{
  display:none;
  color:red;
  font-weight:600;
  margin-top:10px;
  }
</style>

</head>

<body>

<div class="wrapper">

<a href="/" class="back">← Vissza a főoldalra</a>

<div class="product-layout">

<div class="image">
  <div class="gallery">
  <img id="mainImage">

  <div class="gallery-controls">
    <button onclick="prevImage()">◀</button>
    <button onclick="nextImage()">▶</button>
  </div>
  </div>
</div>

<div>

<h1 id="title"></h1>

<div class="price" id="price"></div>

<div id="soldBadge">ELADVA</div>

<p><strong>Méret:</strong> <span id="size"></span></p>

<p id="desc"></p>
<a id="vintedBtn" target="_blank" class="button">
Megnézem Vinteden
</a>

</div>

</div>

</div>

</body>
  <script src="/js/products.js"></script>
  <script>

    document.addEventListener("DOMContentLoaded", () => {

  let currentIndex = 0;
  let images = [];

  function showImage(){
    if(images.length === 0) return;
    document.getElementById("mainImage").src = images[currentIndex];
  }

  function nextImage(){
    currentIndex = (currentIndex + 1) % images.length;
    showImage();
  }

  function prevImage(){
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    showImage();
  }

  window.nextImage = nextImage;
  window.prevImage = prevImage;

  // ✅ SLUG az URL-ből
  const slug = window.location.pathname
    .replace("/termek/","")
    .replace(".html","")
    .replace("/","")
    .trim();

  // ✅ TERMÉK KERESÉS
  const product = products.find(p =>
    p.slug.trim().toLowerCase() === slug.toLowerCase()
  );

  console.log("SLUG:", slug);
  console.log("PRODUCT:", product);

  if(product){

    document.getElementById("title").innerText = product.name;
    document.getElementById("price").innerText = product.price + " Ft";
    document.getElementById("size").innerText = product.size || "-";
    document.getElementById("desc").innerText = product.description || "";
    document.getElementById("vintedBtn").href = product.vinted;

if(product.sold){
  document.getElementById("soldBadge").style.display = "block";
}
    
    images = product.images || [];

    if(images.length > 0){
      showImage();
    }

  } else {
    console.log("NINCS TALÁLAT");
  }
history.replaceState(null, "", window.location.pathname.replace(".html",""));
});
  </script>
</html>
