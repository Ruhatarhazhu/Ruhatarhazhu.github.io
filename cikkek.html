<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Cikkek – Ruhatárház</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Inter, sans-serif;
max-width:900px;
margin:auto;
padding:40px 20px;
background:#f6f6f6;
}

h1{
margin-bottom:30px;
}

.article{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
border:1px solid #eee;
}

.article h2{
margin-bottom:8px;
}

.article a{
display:inline-block;
margin-top:10px;
color:#3a7d2e;
text-decoration:none;
font-weight:600;
}

  .pagination{
display:flex;
gap:8px;
margin-top:30px;
}

.pagination button{
padding:6px 12px;
border:1px solid #ddd;
background:white;
cursor:pointer;
border-radius:6px;
}

.pagination button.active{
background:#3a7d2e;
color:white;
}
</style>
</head>

<body>

<h1>Cikkek</h1>

<div id="articles"></div>

  <div class="pagination" id="pagination"></div>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/1js2SD4xPHS49y5Jo6pjBzScwXnePuTzE2yghCn2pJjU/gviz/tq?sheet=Cikkek";
async function loadArticles(){

const res=await fetch(sheetURL);
const text=await res.text();

const json = JSON.parse(
  text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
);
const rows=json.table.rows;

const container=document.getElementById("articles");

rows.reverse().forEach(r=>{

if(!r.c) return;

const title = r.c[0]?.v || "";
const slug = r.c[1]?.v || "";
const excerpt = r.c[2]?.v || "";

/* ha ez csak fejléc vagy üres sor → kihagyjuk */
if(title.toLowerCase() === "cím") return;
if(!title || !slug) return;

const div=document.createElement("div");
div.className="article";

div.innerHTML=`
<h2>${title}</h2>
<p>${excerpt}</p>
<a href="article.html?slug=${slug}">Elolvasom →</a>
`;

container.appendChild(div);

});
  
}
  renderPagination();

}

function renderPagination(){

const pages=Math.ceil(articles.length/perPage);

const container=document.getElementById("pagination");
container.innerHTML="";

for(let i=1;i<=pages;i++){

const btn=document.createElement("button");

btn.textContent=i;

if(i===currentPage) btn.classList.add("active");

btn.onclick=()=>{
currentPage=i;
render();
};

container.appendChild(btn);

}

}

loadArticles();

</script>

</body>
</html>
